_format_version: "3.0"

services:
  - name: user-service
    url: http://user-service:8000
    routes:
      - name: public-routes
        paths:
          - /health
          - /login
          - /verify
        strip_path: false
      - name: protected-routes
        paths:
          - /users
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss

plugins:
  - name: rate-limiting
    config:
      minute: 10
      policy: local
  - name: ip-restriction
    config:
      allow:
        - 0.0.0.0/0 # Adjust to specific CIDR for production
  - name: custom-header
    config:
      header_name: "X-Kong-Intercepted"
      header_value: "true"

consumers:
  - username: admin-user

jwt_secrets:
  - consumer: admin-user
    key: "admin"
    secret: "my_secret_key"